<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>KMBSC சிட்டு</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+Tamil:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box!important;max-width:100%!important}html,body,#BD,.pg{overflow-x:hidden!important}img,video{max-width:100%!important}
:root{
  --r:#e8300a;--r2:#ff5722;--r3:#ff7043;--r4:#fff3f0;
  --o:#ff6b00;--o2:#ffa040;
  --dark:#1a0a00;--dark2:#2d1200;
  --text:#1a0a00;--text2:#5c3d2e;--text3:#9e7060;
  --bg:#fff9f7;--bg2:#fff3f0;--bg3:#ffe8e0;
  --white:#fff;--gray:#f5f0ee;--gray2:#e8ddd9;
  --green:#00a86b;--blue:#0066ff;
  --shadow:0 4px 20px rgba(232,48,10,.15);
  --shadow2:0 2px 10px rgba(232,48,10,.1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit','Noto Sans Tamil',sans-serif;background:var(--bg);max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;color:var(--text);font-size:14px}

/* ═══ LOGIN ═══ */
#LS{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#1a0a00 0%,#3d1500 40%,#6b2500 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}
#LS::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(255,107,0,.25),transparent 50%),radial-gradient(circle at 80% 20%,rgba(232,48,10,.2),transparent 50%),radial-gradient(circle at 50% 50%,rgba(255,164,64,.08),transparent 70%)}
#LS.hide{display:none}
.L-card{background:rgba(255,255,255,.97);border-radius:32px;padding:36px 28px 28px;width:100%;max-width:380px;position:relative;box-shadow:0 32px 64px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.1)}
.L-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--r),var(--o),var(--r2),var(--o2),var(--r));background-size:300% 100%;animation:flow 3s linear infinite;border-radius:32px 32px 0 0}
@keyframes flow{0%{background-position:0% 0}100%{background-position:300% 0}}
.L-logo{width:80px;height:80px;border-radius:24px;object-fit:cover;display:block;margin:0 auto 16px;box-shadow:0 8px 24px rgba(232,48,10,.3);border:3px solid rgba(232,48,10,.15)}
.L-title{text-align:center;font-size:26px;font-weight:900;color:var(--dark);font-family:'Outfit',sans-serif;letter-spacing:-.5px}
.L-sub{text-align:center;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin:4px 0 24px}
.L-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--bg3);border-radius:16px;padding:5px;margin-bottom:18px}
.LTab{padding:11px;border-radius:12px;border:none;background:transparent;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .2s}
.LTab.on{background:linear-gradient(135deg,var(--r),var(--o));color:#fff;box-shadow:0 4px 14px rgba(232,48,10,.35)}
.L-grp{display:none;margin-bottom:14px}
.L-grp select{width:100%;padding:13px 16px;border-radius:14px;border:2px solid var(--bg3);font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;font-weight:600}
.L-grp select:focus{border-color:var(--r)}
.L-pw{position:relative;margin-bottom:16px}
.L-pw input{width:100%;padding:14px 50px 14px 18px;border-radius:14px;border:2px solid var(--bg3);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;font-weight:600;transition:border-color .2s}
.L-pw input:focus{border-color:var(--r);background:#fff}
.L-pw button{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3)}
.L-btn{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--r),var(--o));color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.3px;box-shadow:0 6px 20px rgba(232,48,10,.4);transition:transform .1s,box-shadow .1s}
.L-btn:active{transform:scale(.97);box-shadow:0 3px 10px rgba(232,48,10,.3)}
.L-err{color:var(--r);font-size:12px;text-align:center;margin-top:10px;min-height:18px;font-weight:700}

/* ═══ HEADER ═══ */
#HD{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 50%,#3d1500 100%);padding:0 14px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3)}
#HD::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--r),var(--o),var(--r2),var(--o2));background-size:200%;animation:flow 3s linear infinite}
.H-l{display:flex;align-items:center;gap:10px}
.H-logo{width:36px;height:36px;border-radius:10px;object-fit:cover;border:2px solid rgba(232,48,10,.4)}
.H-title{font-size:17px;font-weight:900;color:#fff;font-family:'Outfit',sans-serif;letter-spacing:-.3px;line-height:1.1}
.H-title span{display:block;font-size:10px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase}
.H-r{display:flex;align-items:center;gap:7px}
.H-live{background:rgba(0,168,107,.15);border:1px solid rgba(0,168,107,.4);color:#00c27c;border-radius:10px;padding:6px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .2s}
.H-live:active{transform:scale(.95)}
.H-live::before{content:'';width:6px;height:6px;border-radius:50%;background:#00c27c;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.H-grp{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:5px 8px}
.H-grp select{background:transparent;border:none;color:#fff;font-size:11px;font-weight:700;cursor:pointer;outline:none;font-family:inherit}
.H-badge{background:linear-gradient(135deg,var(--r),var(--o));color:#fff;border-radius:10px;padding:5px 10px;font-size:11px;font-weight:800}
.H-out{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:10px;padding:7px 10px;font-size:13px;cursor:pointer;font-family:inherit}

/* ═══ BODY ═══ */
#BD{flex:1;overflow-y:auto;padding:14px 14px 88px}
.pg{display:none}
.pg.on{display:block}

/* ═══ CARDS ═══ */
.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow2);border:1px solid var(--gray2)}
.card-fire{background:linear-gradient(135deg,var(--dark) 0%,#3d1500 100%);border:none;box-shadow:0 8px 32px rgba(0,0,0,.25)}

/* ═══ STAT GRID ═══ */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{border-radius:18px;padding:16px 14px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:-15px;right:-15px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.08)}
.sc-r{background:linear-gradient(135deg,var(--r),var(--r2))}
.sc-o{background:linear-gradient(135deg,var(--o),var(--o2))}
.sc-g{background:linear-gradient(135deg,#00a86b,#00d084)}
.sc-b{background:linear-gradient(135deg,#0066ff,#4499ff)}
.sc .ic{font-size:22px;margin-bottom:6px}
.sc .lb{font-size:10px;color:rgba(255,255,255,.75);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sc .vl{font-size:17px;font-weight:900;color:#fff;margin-top:3px}

/* ═══ MEMBER ROWS ═══ */
.mr{display:flex;align-items:center;background:#fff;border-radius:16px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow2);border-left:4px solid var(--gray2);transition:transform .1s}
.mr:active{transform:scale(.99)}
.mr.pd{border-left-color:var(--green)}
.mr.pn{border-left-color:var(--r)}
.av{width:42px;height:42px;border-radius:14px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;margin-right:12px;flex-shrink:0}

/* ═══ BUTTONS ═══ */
.bn{border:none;border-radius:12px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.bn:active{transform:scale(.95)}
.b-pri{background:linear-gradient(135deg,var(--r),var(--o));color:#fff;box-shadow:0 4px 14px rgba(232,48,10,.3)}
.b-sec{background:var(--bg3);color:var(--r);font-weight:700}
.b-grn{background:linear-gradient(135deg,#00a86b,#00d084);color:#fff;box-shadow:0 4px 14px rgba(0,168,107,.25)}
.b-red{background:#fff0ee;color:var(--r)}
.b-blue{background:#e8f0ff;color:var(--blue)}
.b-wa{background:linear-gradient(135deg,#00a86b,#007a4e);color:#fff;box-shadow:0 4px 14px rgba(0,168,107,.3)}
.b-full{width:100%;padding:14px;font-size:14px;border-radius:16px;margin-top:10px}

/* ═══ FILTER TABS ═══ */
.ft{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.ft::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:10px 16px;border-radius:12px;border:2px solid var(--gray2);background:#fff;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.fb.on{border-color:transparent;background:linear-gradient(135deg,var(--r),var(--o));color:#fff;box-shadow:0 4px 12px rgba(232,48,10,.3)}

/* ═══ PROGRESS ═══ */
.pb{height:8px;background:var(--bg3);border-radius:6px;overflow:hidden}
.pf{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--r),var(--o));transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ═══ SCHEDULE ═══ */
.sk{background:#fff;border-radius:18px;overflow:hidden;box-shadow:var(--shadow2);border:1px solid var(--gray2)}
.sr{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--gray);cursor:pointer;transition:background .15s;min-width:0;overflow:hidden}
.sr:last-child{border-bottom:none}
.sr:active{background:var(--bg2)}
.sr>div{min-width:0;overflow:hidden;text-overflow:ellipsis}
.sr.on{background:linear-gradient(135deg,var(--r4),#fff8f5)}
.sr-num{width:28px;height:28px;border-radius:10px;background:var(--bg3);color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-right:10px;flex-shrink:0}
.sr.on .sr-num{background:linear-gradient(135deg,var(--r),var(--o));color:#fff}

/* ═══ INPUTS ═══ */
.ip{width:100%;padding:13px 16px;border-radius:14px;border:2px solid var(--gray2);font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;font-weight:600;transition:border-color .2s;margin-bottom:10px}
.ip:focus{border-color:var(--r)}
.sl{width:100%;padding:13px 16px;border-radius:14px;border:2px solid var(--gray2);font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;font-weight:600;margin-bottom:10px}

/* ═══ RECEIPT / WINNER ═══ */
.rr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray)}
.rr:last-child{border-bottom:none}

/* ═══ OVERLAYS ═══ */
.ov{position:fixed;inset:0;background:rgba(26,10,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.on{opacity:1;pointer-events:all}
.ob{background:#fff;border-radius:28px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.4);transform:translateY(20px) scale(.95);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.ov.on .ob{transform:translateY(0) scale(1)}
.o-head{background:linear-gradient(135deg,var(--dark),#3d1500);color:#fff;padding:22px 20px;position:relative}
.o-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--r),var(--o))}
.wb{background:linear-gradient(145deg,#fff8f0,#fff3e8);border:3px solid var(--o);border-radius:28px;padding:32px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(255,107,0,.2)}

/* ═══ NAVBAR ═══ */
#NV{display:flex;background:#fff;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;box-shadow:0 -1px 0 var(--gray2),0 -8px 32px rgba(0,0,0,.08);padding:6px 0 10px;safe-area-inset-bottom:env(safe-area-inset-bottom)}
.NB{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 4px 2px;background:transparent;border:none;cursor:pointer;color:var(--text3);font-family:inherit;transition:color .2s;position:relative}
.NB.on{color:var(--r)}
.NB.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:3px;background:linear-gradient(90deg,var(--r),var(--o));border-radius:0 0 4px 4px}
.N-ic{font-size:20px;line-height:1;transition:transform .2s}
.NB.on .N-ic{transform:scale(1.1)}
.N-lb{font-size:9px;margin-top:3px;font-weight:700;letter-spacing:.3px;line-height:1.4;text-align:center}
.NB.hid{display:none}

/* ═══ TOAST ═══ */
#Ts{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--dark);color:#fff;padding:12px 24px;border-radius:40px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 24px rgba(0,0,0,.3)}
#Ts.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ WA BUTTON ═══ */
.wa-btn{background:linear-gradient(135deg,#00a86b,#007a4e);color:#fff;border:none;border-radius:16px;padding:14px 16px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:10px;box-shadow:0 5px 18px rgba(0,168,107,.3);transition:transform .1s}
.wa-btn:active{transform:scale(.97)}
.wa-float{background:linear-gradient(135deg,#00a86b,#007a4e);color:#fff;border:none;border-radius:16px;padding:14px 16px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:10px;box-shadow:0 5px 18px rgba(0,168,107,.3);transition:transform .1s}
.wa-float:active{transform:scale(.97)}
.bwa{background:linear-gradient(135deg,#00a86b,#007a4e);color:#fff;padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.bwa-btn{background:linear-gradient(135deg,#00a86b,#007a4e);color:#fff;border:none;padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.be{background:#e8f0ff;color:var(--blue);border:none;padding:8px 10px;border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700}
.bd{background:#fff0ee;color:var(--r);border:none;padding:8px 10px;border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700}
.bp{background:linear-gradient(135deg,var(--r),var(--o));color:#fff;border:none;padding:9px 14px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(232,48,10,.25)}

/* Section title */
.st{font-size:15px;font-weight:800;color:var(--text);margin:4px 0 12px;display:flex;align-items:center;gap:8px}

/* Month grid */
.mb{background:var(--bg2);border-radius:14px;padding:14px;font-size:13px;white-space:pre-wrap;line-height:1.8;max-height:220px;overflow-y:auto;margin-bottom:10px;border:1px solid var(--bg3);color:var(--text2)}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pg.on>*{animation:slideUp .2s ease both}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pulse{animation:pulse 1.5s infinite}
html,body{overflow-x:hidden!important;max-width:100vw}
#BD{overflow-x:hidden;box-sizing:border-box}
.sg{display:grid!important;grid-template-columns:1fr 1fr!important;gap:8px!important;width:100%;box-sizing:border-box!important}
.sc{min-width:0;overflow:hidden;box-sizing:border-box}
</style>
</head>
